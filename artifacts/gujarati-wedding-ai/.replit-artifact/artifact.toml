kind = "web"
previewPath = "/"
title = "Gujarati Wedding AI Assistant"
version = "1.0.0"
id = "artifacts/gujarati-wedding-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19005

[services.development]
run = "pnpm --filter @workspace/gujarati-wedding-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gujarati-wedding-ai", "run", "build" ]
publicDir = "artifacts/gujarati-wedding-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19005"
BASE_PATH = "/"
